services:
  db:
    image: mariadb
    restart: always
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: carlos03
      MYSQL_DATABASE: db_ef       # Crea la base de datos automáticamente
      MYSQL_USER: carlos          # Crea tu usuario automáticamente
      MYSQL_PASSWORD: lenovo0306  # Le asigna tu contraseña

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8084:80
    environment:
      - PMA_ARBITRARY=1

  # NUEVO: Contenedor del Servidor Web para CakePHP
  web:
    image: php:8.4-apache
    restart: always
    ports:
      - 8765:80
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    command: >
      bash -c "apt-get update && apt-get install -y libicu-dev && docker-php-ext-configure intl && docker-php-ext-install intl pdo_mysql && a2enmod rewrite && apache2-foreground"